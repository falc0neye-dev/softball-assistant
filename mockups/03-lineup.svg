<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs><clipPath id="s"><rect width="390" height="844" rx="28"/></clipPath></defs>
  <g clip-path="url(#s)">
    <rect width="390" height="844" fill="#F6F4ED"/>

    <!-- App bar -->
    <rect width="390" height="118" fill="#1F5632"/>
    <text x="20" y="30" fill="#DCE8DC" font-size="13" font-weight="600">9:41</text>
    <rect x="330" y="20" width="18" height="10" rx="2" fill="none" stroke="#DCE8DC" stroke-width="1.5"/>
    <rect x="332" y="22" width="11" height="6" fill="#DCE8DC"/>
    <text x="20" y="60" fill="#9FC2A6" font-size="10" letter-spacing="2.5" font-weight="700">SUN JUL 12 · 10:00 AM · VICTORY FIELD</text>
    <text x="20" y="90" fill="#FFFFFF" font-size="23" font-weight="800">vs. Ridgewood Rockets</text>

    <!-- Tabs -->
    <rect x="0" y="118" width="390" height="46" fill="#FFFFFF" stroke="#E6E2D4"/>
    <text x="65" y="147" text-anchor="middle" fill="#8A8676" font-size="14" font-weight="600">Availability</text>
    <text x="195" y="147" text-anchor="middle" fill="#B85C38" font-size="14" font-weight="800">Lineup</text>
    <rect x="164" y="160" width="62" height="4" rx="2" fill="#B85C38"/>
    <text x="322" y="147" text-anchor="middle" fill="#8A8676" font-size="14" font-weight="600">Scorecard</text>

    <!-- Lineup type + ratio -->
    <rect x="16" y="180" width="220" height="36" rx="18" fill="#F0EDE2"/>
    <rect x="126" y="182" width="108" height="32" rx="16" fill="#1F5632"/>
    <text x="71" y="203" text-anchor="middle" fill="#8A8676" font-size="13" font-weight="700">Static</text>
    <text x="180" y="203" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="800">Dynamic</text>
    <rect x="248" y="180" width="126" height="36" rx="18" fill="none" stroke="#D69A2D" stroke-width="1.5"/>
    <text x="311" y="203" text-anchor="middle" fill="#8A6410" font-size="13" font-weight="800">Ratio  3 M : 1 F ▾</text>

    <!-- Male queue -->
    <text x="20" y="248" fill="#3E5C76" font-size="11" letter-spacing="2" font-weight="800">MALE QUEUE (5)</text>
    <g font-size="14" font-weight="700">
      <rect x="16" y="258" width="358" height="40" rx="10" fill="#FFFFFF" stroke="#E6E2D4"/>
      <text x="34" y="283" fill="#B4AFA0">≡</text><text x="60" y="283" fill="#24291F">Keith Falcon</text>
      <rect x="16" y="302" width="358" height="40" rx="10" fill="#FFFFFF" stroke="#E6E2D4"/>
      <text x="34" y="327" fill="#B4AFA0">≡</text><text x="60" y="327" fill="#24291F">Jonathan Falcon</text>
      <rect x="16" y="346" width="358" height="40" rx="10" fill="#FFFFFF" stroke="#E6E2D4"/>
      <text x="34" y="371" fill="#B4AFA0">≡</text><text x="60" y="371" fill="#24291F">Steven Marks</text>
      <rect x="16" y="390" width="358" height="40" rx="10" fill="#FFFFFF" stroke="#E6E2D4"/>
      <text x="34" y="415" fill="#B4AFA0">≡</text><text x="60" y="415" fill="#24291F">Mike Torres</text>
      <rect x="16" y="434" width="358" height="40" rx="10" fill="#FFFFFF" stroke="#E6E2D4"/>
      <text x="34" y="459" fill="#B4AFA0">≡</text><text x="60" y="459" fill="#24291F">Robert Chen</text>
    </g>

    <!-- Female queue -->
    <text x="20" y="508" fill="#9A6D14" font-size="11" letter-spacing="2" font-weight="800">FEMALE QUEUE (2)</text>
    <g font-size="14" font-weight="700">
      <rect x="16" y="518" width="358" height="40" rx="10" fill="#FFFDF6" stroke="#E6C87F"/>
      <text x="34" y="543" fill="#B4AFA0">≡</text><text x="60" y="543" fill="#24291F">Ely Rosen</text>
      <rect x="16" y="562" width="358" height="40" rx="10" fill="#FFFDF6" stroke="#E6C87F"/>
      <text x="34" y="587" fill="#B4AFA0">≡</text><text x="60" y="587" fill="#24291F">Erin Walsh</text>
    </g>

    <!-- Preview -->
    <text x="20" y="636" fill="#6E6A5C" font-size="11" letter-spacing="2" font-weight="800">PREVIEW — BATTING ORDER</text>
    <g font-size="13" font-weight="700">
      <text x="24" y="662" fill="#B4AFA0">1</text><text x="48" y="662" fill="#24291F">Keith Falcon</text>
      <text x="204" y="662" fill="#B4AFA0">5</text><text x="228" y="662" fill="#24291F">Mike Torres</text>
      <text x="24" y="688" fill="#B4AFA0">2</text><text x="48" y="688" fill="#24291F">Jonathan Falcon</text>
      <text x="204" y="688" fill="#B4AFA0">6</text><text x="228" y="688" fill="#24291F">Robert Chen</text>
      <text x="24" y="714" fill="#B4AFA0">3</text><text x="48" y="714" fill="#24291F">Steven Marks</text>
      <text x="204" y="714" fill="#B4AFA0">7</text><text x="228" y="714" fill="#24291F">Keith Falcon</text>
      <rect x="42" y="726" width="120" height="22" rx="11" fill="#FBF2DF"/>
      <text x="24" y="742" fill="#B4AFA0">4</text><text x="48" y="742" fill="#9A6D14">Ely Rosen · F</text>
      <rect x="222" y="726" width="122" height="22" rx="11" fill="#FBF2DF"/>
      <text x="204" y="742" fill="#B4AFA0">8</text><text x="228" y="742" fill="#9A6D14">Erin Walsh · F</text>
    </g>
    <text x="20" y="774" fill="#8A8676" font-size="11">Queues cycle independently — order continues all game</text>

    <!-- Start game -->
    <rect x="16" y="786" width="358" height="48" rx="24" fill="#1F5632"/>
    <text x="195" y="816" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="800">▶  Start game</text>
  </g>
